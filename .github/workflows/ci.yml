name: DriveIn CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Klonowanie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, curl, libxml, sqlite3
        coverage: none

    - name: Kopiowanie pliku konfiguracyjnego środowiska
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Instalacja zależności Composera
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Wygenerowanie klucza aplikacji
      run: php artisan key:generate

    - name: Nadanie uprawnień do folderów zapisu
      run: chmod -R 777 storage bootstrap/cache

    - name: Przygotowanie bazy danych SQLite w pamięci dla testów
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Uruchomienie testów jednostkowych i feature'owych (PHPUnit)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
